<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Tracking Pengunjung Bromo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
  /* 1. Latar Belakang Foto */
  body {
    background-image: url("https://i.pinimg.com/736x/d5/fa/66/d5fa660d2e02cb8b5f2c3e1489919426.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    position: relative;
    min-height: 100vh;
    margin: 0;
  }

  /* 2. Lapisan Blur */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.3); /* Gelapkan gambar agar kartu lebih menonjol */
    backdrop-filter: blur(8px); /* Efek ngeblur */
    z-index: -1;
  }

  /* 3. Desain Kartu Login (Glassmorphism) */
  .card {
    background: rgba(255, 255, 255, 0.85) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px !important;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) !important;
  }
</style>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg p-4" style="width: 400px;">
    <!-- Notifikasi dipindah ke atas -->
    <div id="notif" class="mb-3 text-center"></div>

    <h1 class="text-center text-primary mb-4">Login Sistem Tracking Bromo</h1>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Masukkan email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3">Belum punya akun? <a href="register.html" class="text-primary">Register</a></p>
  </div>

  <script>
  function goToTrackingLogin(event) {
    event.preventDefault(); // cegah reload default

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // Simulasi data user yang sudah register
    const registeredUsers = [
      { email: "dea@gmail.com", password: "123" },
      { email: "Lova@gmail.com", password: "dea" }
    ];

    // Cari apakah user terdaftar
    const user = registeredUsers.find(u => u.email === email && u.password === password);

    if (user) {
      alert("Login berhasil! Selamat datang");
      window.location.href = "tiket_harian.html"; // redirect ke halaman tracking
    } else {
      alert("Anda belum terdaftar atau password salah!");
    }
  }

  // Pasang event listener ke form
  document.getElementById("loginForm").addEventListener("submit", goToTrackingLogin);
</script>
</body>
</html>
