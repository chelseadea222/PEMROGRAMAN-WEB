<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Register - Tracking Pengunjung Bromo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg p-4" style="width: 400px;">
    <h1 class="text-center text-success mb-4">Registrasi Akun</h1>
    <form onsubmit="return goToTiketHarian(event)">
      <div class="mb-3">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" id="nama" placeholder="Masukkan nama" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Masukkan email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
      </div>
      <button class="btn btn-success w-100">Daftac</button>
    </form>
    <p class="text-center mt-3">Sudah punya akun? <a href="login.html" class="text-success">Login</a></p>
  </div>

  <style>
  /* 1. Latar Belakang Foto Blur */
  body {
    background-image: url("https://i.pinimg.com/736x/d5/fa/66/d5fa660d2e02cb8b5f2c3e1489919426.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(8px);
    z-index: -1;
  }

  /* 2. Desain Kartu Registrasi (Glassmorphism) */
  .card {
    background: rgba(255, 255, 255, 0.9) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px !important;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) !important;
  }

  /* 3. Penyesuaian Teks agar Terbaca */
  h1 { color: #198754 !important; font-weight: bold; }
  .form-label { font-weight: 500; color: #333; }
</style>

  <script>
    function goToTiketHarian(event) {
      event.preventDefault();

      // Ambil data dari form
      const nama = document.getElementById('nama').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simpan ke localStorage sebagai data pengunjung
      let dataList = JSON.parse(localStorage.getItem("tiketHarian")) || [];
      dataList.push({
        nama: nama,
        tanggal: new Date().toISOString().slice(0,10), // otomatis tanggal hari ini
        tiket: 1 // default 1 tiket saat registrasi
      });
      localStorage.setItem("tiketHarian", JSON.stringify(dataList));

      alert("Registrasi berhasil! Data masuk ke tiket_harian.");
      window.location.href = "tiket_harian.html"; // redirect ke halaman tiket harian
    }
  </script>
</body>
</html>
