<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Backup Tiket Harian</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h2>Backup Data Tiket Harian</h2>

  <table class="table table-bordered" id="backupTable">
    <thead class="table-dark">
      <tr><th>Nama</th><th>Tanggal</th><th>Tiket</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <style>
  /* 1. Latar Belakang Utama */
  body {
    background-image: url("https://i.pinimg.com/736x/d5/fa/66/d5fa660d2e02cb8b5f2c3e1489919426.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    position: relative;
    color: #fff;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  /* 2. Efek Blur Global */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.4); /* Gelapkan gambar agar teks putih terlihat */
    backdrop-filter: blur(8px);
    z-index: -1;
  }

  /* 3. Desain Tabel Modern Glass */
  .table {
    background: rgba(255, 255, 255, 0.9) !important; /* Putih soft untuk keterbacaan */
    backdrop-filter: blur(10px);
    border-radius: 15px;
    overflow: hidden;
    color: #333 !important; /* Teks gelap */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }

  .table thead {
    background: #0d47a1 !important; /* Biru tegas untuk header */
    color: #fff !important;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }

  .table tbody td {
    color: #333 !important; /* Pastikan teks isi gelap */
    border-bottom: 1px solid #dee2e6 !important;
  }

  /* Judul */
  h2 {
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 30px;
    color: #fff;
  }

  /* Tombol-tombol */
  .btn {
    font-weight: 600;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
</style>

<!-- Tombol Backup -->
<button id="backupCsv" class="btn btn-warning me-2">
  <i class="bi bi-file-earmark-spreadsheet"></i> Backup ke CSV
</button>

<button id="backupMonthly" class="btn btn-info me-2">
  <i class="bi bi-calendar-check"></i> Backup Per Bulan (JSON)
</button>

<!-- Tombol Navigasi -->
<a href="dashboard.html" class="btn btn-secondary me-2">
  <i class="bi bi-speedometer2"></i> Balik ke Dashboard
</a>

<a href="tiket_harian.html" class="btn btn-danger">
  <i class="bi bi-calendar-day"></i> Data Tiket Harian
</a>
<script>
  const tableBody = document.querySelector('#backupTable tbody');
  // gunakan key yang sama dengan tiket_harian & dashboard
  const dataList = JSON.parse(localStorage.getItem("dataTiket")) || [];

  // kelompokkan data per bulan
  const monthlyData = {};
  dataList.forEach(item => {
    const bulan = item.tanggal.slice(0,7); // ambil YYYY-MM
    if (!monthlyData[bulan]) {
      monthlyData[bulan] = [];
    }
    monthlyData[bulan].push(item);
  });

  // tampilkan data per bulan di tabel
  for (const bulan in monthlyData) {
    const headerRow = document.createElement('tr');
    headerRow.innerHTML = `<td colspan="4" class="table-secondary fw-bold">Bulan: ${bulan}</td>`;
    tableBody.appendChild(headerRow);

    monthlyData[bulan].forEach(item => {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${item.nama}</td><td>${item.tanggal}</td><td>${item.jumlah}</td><td>${item.status}</td>`;
      tableBody.appendChild(row);
    });
  }

  // backup JSON per bulan
  document.getElementById('backupJson').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(monthlyData, null, 2)], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "backup_tiket_perbulan.json";
    link.click();
  });

  // backup CSV per bulan
  document.getElementById('backupCsv').addEventListener('click', () => {
    let csvContent = "data:text/csv;charset=utf-8,Bulan,Nama,Tanggal,Tiket,Status\n";
    for (const bulan in monthlyData) {
      monthlyData[bulan].forEach(item => {
        csvContent += `${bulan},${item.nama},${item.tanggal},${item.jumlah},${item.status}\n`;
      });
    }
    const link = document.createElement("a");
    link.href = encodeURI(csvContent);
    link.download = "backup_tiket_perbulan.csv";
    link.click();
  });
</script>
</body>
</html>
