<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tiket Harian</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h2>Data Pengunjung & Tiket Harian</h2>
  <form id="visitorForm" class="mb-3">
    <input type="text" id="nama" placeholder="Nama" class="form-control mb-2" required>
    <input type="date" id="tanggal" class="form-control mb-2" required>
    <input type="number" id="tiket" placeholder="Jumlah Tiket" class="form-control mb-2" min="1" required>
    <select id="status" class="form-control mb-2" required>
      <option value="Lunas">Lunas</option>
      <option value="Pending">Pending</option>
    </select>
    <button type="submit" class="btn btn-primary">Tambah Data</button>
  </form>
  
 <style>
  /* 1. Latar Belakang Utama */
  body {
    background-image: url("https://i.pinimg.com/736x/d5/fa/66/d5fa660d2e02cb8b5f2c3e1489919426.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    position: relative;
    color: #fff;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  /* 2. Efek Blur Global */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.3); /* Gelapkan sedikit gambar */
    backdrop-filter: blur(8px); /* Tingkat blur pemandangan */
    z-index: -1;
  }

  /* 3. Desain Form (Kaca) */
  form {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  .form-control, .form-select {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 8px;
    border: none;
    padding: 10px;
  }

 /* 4. Desain Tabel (Modern Soft White) */
  .table {
    background: rgba(255, 255, 255, 0.85); /* Putih susu yang tidak tembus pandang sepenuhnya */
    backdrop-filter: blur(5px);
    border-radius: 15px;
    overflow: hidden;
    border: none !important;
    color: #333 !important; /* Teks diubah jadi gelap agar kontras dengan putih */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  /* Header Tabel */
  .table thead {
    background: #f8fafc !important; /* Putih keabu-abuan yang sangat lembut */
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 1px;
    border-bottom: 2px solid #e2e8f0 !important;
  }

  .table th {
    padding: 15px !important;
    border: none !important;
    color: #1e293b !important; /* Warna teks header biru gelap */
  }

  /* Body Tabel */
  .table tbody td {
    padding: 12px 15px !important;
    vertical-align: middle;
    border-bottom: 1px solid #f1f5f9 !important; /* Garis pemisah yang sangat halus */
    background: transparent !important;
    color: #475569 !important; /* Warna teks isi tabel */
  }

  /* Efek Hover baris tabel */
  .table tbody tr:hover {
    background: #f1f5f9 !important; /* Berubah jadi abu-abu muda saat di-hover */
    transition: 0.3s;
  }

  /* Header Tabel */
  .table thead {
    background: linear-gradient(45deg, #0d47a1, #1976d2) !important;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }

  .table th {
    padding: 15px !important;
    border: none !important;
    color: #fff !important;
  }

  /* Body Tabel */
  .table tbody td {
    padding: 12px 15px !important;
    vertical-align: middle;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    background: transparent !important;
    color: #2b2c41 !important;
  }

  /* Efek Hover baris tabel */
  .table tbody tr:hover {
    background: rgba(255, 255, 255, 0.1) !important;
    transition: 0.3s;
  }

  /* 5. Tombol-tombol */
  .btn-primary {
    background: #2563eb;
    border: none;
    font-weight: 600;
  }

  .btn-danger {
    border-radius: 8px;
    padding: 5px 15px;
  }

  h2 {
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 30px;
  }
</style>

<table class="table table-bordered" id="dataTable">
  <thead class="table-dark">
    <tr>
      <th>Nama</th>
      <th>Tanggal</th>
      <th>Tiket</th>
      <th>Status</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Tambahan tombol navigasi -->
<div class="mt-3">
  <a href="dashboard.html" class="btn btn-secondary me-2">
    <i class="bi bi-speedometer2"></i> Dashboard Admin
  </a>
  <a href="backup_tiket.html" class="btn btn-warning me-2">
    <i class="bi bi-archive"></i> Backup Data Tiket
  </a>
</div>

  <script>
    const form = document.getElementById('visitorForm');
    const tableBody = document.querySelector('#dataTable tbody');
    // gunakan key yang sama dengan dashboard
    let dataList = JSON.parse(localStorage.getItem("dataTiket")) || [];

    // fungsi render ulang tabel
    function renderTable() {
      tableBody.innerHTML = "";
      dataList.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.nama}</td>
          <td>${item.tanggal}</td>
          <td>${item.jumlah}</td>
          <td>${item.status}</td>
          <td><button class="btn btn-danger btn-sm" onclick="hapusData(${index})">Hapus</button></td>
        `;
        tableBody.appendChild(row);
      });
    }

    // tampilkan data lama
    renderTable();

    form.addEventListener('submit', e => {
      e.preventDefault();
      const nama = document.getElementById('nama').value;
      const tanggal = document.getElementById('tanggal').value;
      const jumlah = document.getElementById('tiket').value;
      const status = document.getElementById('status').value;

      const newData = { nama, tanggal, jumlah, status };
      dataList.push(newData);
      localStorage.setItem("dataTiket", JSON.stringify(dataList));

      renderTable();
      form.reset();
    });

    // fungsi hapus data
    function hapusData(index) {
      if (confirm("Yakin ingin menghapus data ini?")) {
        dataList.splice(index, 1);
        localStorage.setItem("dataTiket", JSON.stringify(dataList));
        renderTable();
      }
    }
  </script>
</body>
</html>
