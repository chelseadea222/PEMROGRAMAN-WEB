<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tracking Pengunjung Wisata</title>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://assets.pikiran-rakyat.com/crop/0x0:0x0/720x0/webp/photo/2025/05/31/1499698662.jpg" alt="Banner">
            <h1>Sistem Tracking Jumlah Pengunjung</h1>
        </header>

        <h2>Data Kunjungan Terbaru</h2>
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Petugas</th>
                    <th>Lokasi</th>
                    <th>Jumlah</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <div class="form-section">
            <h2>Input Data Tracking</h2>
            <form id="trackingForm" onsubmit="updateTracking(event)">
                <label for="petugas">Nama Petugas:</label>
                <input type="text" id="petugas" required>
                
                <label for="lokasi">Lokasi Pemantauan:</label>
                <input type="text" id="lokasi" required>

                <label for="jumlah">Jumlah Pengunjung:</label>
                <input type="number" id="jumlah" required>
                
                <button type="submit">Update Tabel</button>
            </form>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
